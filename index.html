<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index De Anda</title>

    <link rel="stylesheet" href="styles.css">
  </head>

  <body>
    <div id="loginScreen" class="login-screen">
      <form class="login-card" onsubmit="login(event)">
        <div class="login-brand">
          <span class="brand-title">Index</span>
          <span class="brand-subtitle">De Anda</span>
        </div>

        <label for="loginUsuario">Usuario</label>
        <input id="loginUsuario" type="text" autocomplete="username" required>

        <label for="loginPassword">Contraseña</label>
        <input id="loginPassword" type="password" autocomplete="current-password" required>

        <button type="submit">Entrar</button>

        <p id="loginStatus" class="login-status"></p>
      </form>
    </div>

    <div id="appScreen" class="app">
      <header class="topbar">
        <div class="brand">
          <span class="brand-title">Index</span>
          <span class="brand-subtitle">De Anda</span>
        </div>

        <button class="logout-button" onclick="cerrarSesion()">Cerrar sesion</button>
      </header>

      <div class="main-layout">
        <aside class="sidebar">
          <button class="menu-toggle" onclick="toggleSidebar()" aria-label="Abrir menu">
            ☰
          </button>

          <nav id="sideMenu" class="side-menu open">
            <button data-section="buscador" onclick="showSection('buscador')">Buscador</button>
            <button data-section="nuevoCodigo" onclick="showSection('nuevoCodigo')">Nuevo Codigo</button>
            <button data-section="panelControl" onclick="showSection('panelControl')">Panel de control</button>
            <button data-section="solicitudes" onclick="showSection('solicitudes')">Solicitudes</button>
            <button data-section="manual" onclick="showSection('manual')">Manual</button>
          </nav>
        </aside>

        <main class="content">
          <section id="viewer" class="viewer">
            <h2>Bienvenido</h2>
            <p>Aqui se mostrara el contenido del modulo seleccionado.</p>
          </section>
        </main>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="scripts.js?v=20260623-1"></script>
    <script src="nuevoCodigo.js?v=20260624-1"></script>
    <script src="panel.js?v=20260624-3"></script>
    <script src="Solicitudes.js?v=20260623-17"></script>
    <script src="login.js?v=20260623-1"></script>
  </body>
</html>
